name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Regenerate release/readme.html from README.md
        run: pandoc -f gfm -t html -s --metadata title="Monster Train 2 Accessibility Mod" README.md -o release/readme.html

      - name: Create zip
        run: cd release && zip -r ../MonsterTrain2Accessibility-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: MonsterTrain2Accessibility-${{ github.ref_name }}.zip
          generate_release_notes: true
